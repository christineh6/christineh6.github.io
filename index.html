<!DOCTYPE html>
<html>

<head>

<title>Christine</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0f172a;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* Player */
#player{
width:40px;
height:40px;
background:#38bdf8;
position:absolute;
top:300px;
left:300px;
border-radius:10px;
transition:.05s;
}

/* About box */
.box{
width:220px;
height:220px;
background:#1e293b;
position:absolute;
border-radius:14px;
border:3px solid #38bdf8;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:22px;
}

#about{
top:150px;
left:500px;
}

/* Info popup */
#info{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:white;
padding:30px;
border-radius:16px;
display:none;
width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* Profile image */
.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:4px solid #2563eb;
}

/* Title */
#title{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:28px;
}

/* Button */
.button{
display:inline-block;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:15px;
}

.button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div id="title">
Use arrow keys or WASD to move
</div>

<div id="player"></div>

<div class="box" id="about">
About Me
</div>

<div id="info">

<img src="duck.jpg" class="profile">

<h2>Christine</h2>

<p>
Hi
</p>

<p>
Email: christinehuangws@email.com
</p>

<a href="audio.html" class="button">
Open Audio Page
</a>

</div>

<script>

let player = document.getElementById("player");

let x = 300;
let y = 300;
let speed = 6;

document.addEventListener("keydown", function(e){

if(e.key=="ArrowRight" || e.key=="d") x+=speed;
if(e.key=="ArrowLeft" || e.key=="a") x-=speed;
if(e.key=="ArrowUp" || e.key=="w") y-=speed;
if(e.key=="ArrowDown" || e.key=="s") y+=speed;

player.style.left = x+"px";
player.style.top = y+"px";

checkCollision();

});

function checkCollision(){

let info = document.getElementById("info");

if(x>450 && x<720 && y>100 && y<380){

info.style.display="block";

}else{

info.style.display="none";

}

}

</script>

</body>

</html>
