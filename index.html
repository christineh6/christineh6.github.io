<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video background */
        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Lyrics overlay */
        .lyrics-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        .lyrics-line {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            margin: 10px 0;
        }

        .lyrics-line.active {
            opacity: 1;
        }

        /* Audio visualizer */
        .visualizer-container {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 100px;
        }

        .bar {
            width: 8px;
            background: linear-gradient(to top, #00f2ff, #ff00ff);
            border-radius: 4px 4px 0 0;
            transition: height 0.1s ease;
        }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 20px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        button {
            background: #fff;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .play-icon, .pause-icon {
            width: 0;
            height: 0;
            border-style: solid;
        }

        .play-icon {
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #000;
            margin-left: 4px;
        }

        .pause-icon {
            width: 20px;
            height: 24px;
            border-left: 6px solid #000;
            border-right: 6px solid #000;
            box-sizing: border-box;
        }

        .time-display {
            color: #fff;
            font-size: 14px;
            min-width: 100px;
            text-align: center;
        }

        /* Progress bar */
        .progress-container {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            z-index: 4;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Upload section (hidden after files loaded) */
        .upload-section {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
        }

        .upload-section.hidden {
            display: none;
        }

        .upload-item {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .upload-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.2s;
            display: inline-block;
        }

        .upload-btn:hover {
            transform: scale(1.05);
        }

        .upload-btn.loaded {
            background: #00ff00;
        }

        input[type="file"] {
            display: none;
        }

        .instruction {
            margin: 10px 0;
            font-size: 14px;
            color: #aaa;
        }

        .file-status {
            margin-top: 10px;
            font-size: 13px;
            color: #00ff00;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Video background -->
        <video id="video-background" loop muted></video>

        <!-- Lyrics overlay -->
        <div class="lyrics-overlay" id="lyrics-overlay"></div>

        <!-- Audio visualizer -->
        <div class="visualizer-container" id="visualizer"></div>

        <!-- Progress bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="play-pause-btn">
                <div class="play-icon"></div>
            </button>
            <div class="time-display" id="time-display">0:00 / 0:00</div>
        </div>

        <!-- Upload section -->
        <div class="upload-section" id="upload-section">
            <h2>Upload Your Files</h2>
            
            <div class="upload-item">
                <div class="instruction">1. Music file (MP3, WAV, etc.)</div>
                <label for="audio-upload" class="upload-btn" id="audio-btn">Choose Audio</label>
                <input type="file" id="audio-upload" accept="audio/*">
                <div class="file-status" id="audio-status"></div>
            </div>
            
            <div class="upload-item">
                <div class="instruction">2. Video or image for background</div>
                <label for="video-upload" class="upload-btn" id="video-btn">Choose Video/Image</label>
                <input type="file" id="video-upload" accept="video/*,image/*">
                <div class="file-status" id="video-status"></div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // Elements
        const audioPlayer = document.getElementById('audio-player');
        const videoBackground = document.getElementById('video-background');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const lyricsOverlay = document.getElementById('lyrics-overlay');
        const visualizerContainer = document.getElementById('visualizer');
        const timeDisplay = document.getElementById('time-display');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const uploadSection = document.getElementById('upload-section');

        // File inputs
        const audioUpload = document.getElementById('audio-upload');
        const videoUpload = document.getElementById('video-upload');

        // State
        let lyrics = [];
        let currentLyricIndex = -1;
        let audioContext, analyser, dataArray, bufferLength, source;
        let bars = [];
        let filesLoaded = { audio: false, video: false };

        // Create visualizer bars
        function createBars() {
            const barCount = 40;
            for (let i = 0; i < barCount; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = '10px';
                visualizerContainer.appendChild(bar);
                bars.push(bar);
            }
        }

        // Handle file uploads
        audioUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                filesLoaded.audio = true;
                document.getElementById('audio-btn').classList.add('loaded');
                document.getElementById('audio-status').textContent = `✓ Loaded: ${file.name}`;
                console.log('Audio loaded:', file.name);
                checkFilesLoaded();
            }
        });

        videoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('video/')) {
                    videoBackground.src = url;
                    videoBackground.load();
                } else if (file.type.startsWith('image/')) {
                    videoBackground.poster = url;
                    videoBackground.style.display = 'block';
                }
                filesLoaded.video = true;
                document.getElementById('video-btn').classList.add('loaded');
                document.getElementById('video-status').textContent = `✓ Loaded: ${file.name}`;
                console.log('Video/Image loaded:', file.name);
                checkFilesLoaded();
            }
        });

        function checkFilesLoaded() {
            console.log('Checking files:', filesLoaded);
            if (filesLoaded.audio && filesLoaded.video) {
                console.log('All files loaded! Setting up player...');
                uploadSection.classList.add('hidden');
                setupAudioContext();
                
                // Try to auto-start playback
                setTimeout(() => {
                    audioPlayer.play().then(() => {
                        console.log('Audio started automatically');
                        videoBackground.play();
                        playPauseBtn.innerHTML = '<div class="pause-icon"></div>';
                        animateVisualizer();
                    }).catch(err => {
                        console.log('Auto-play blocked, user needs to click play:', err);
                    });
                }, 100);
            }
        }

        // Parse lyrics
        function parseLyrics(text) {
            lyrics = [];
            const lines = text.split('\n');
            lines.forEach(line => {
                const match = line.match(/^(\d+):(\d+)\s+(.+)$/);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const timeInSeconds = minutes * 60 + seconds;
                    lyrics.push({
                        time: timeInSeconds,
                        text: match[3].trim()
                    });
                }
            });
            displayLyrics();
        }

        function displayLyrics() {
            lyricsOverlay.innerHTML = '';
            lyrics.forEach((lyric, index) => {
                const line = document.createElement('div');
                line.className = 'lyrics-line';
                line.textContent = lyric.text;
                line.dataset.index = index;
                lyricsOverlay.appendChild(line);
            });
        }

        // Update lyrics based on time
        function updateLyrics() {
            const currentTime = audioPlayer.currentTime;
            
            for (let i = lyrics.length - 1; i >= 0; i--) {
                if (currentTime >= lyrics[i].time) {
                    if (currentLyricIndex !== i) {
                        // Deactivate all lines
                        document.querySelectorAll('.lyrics-line').forEach(line => {
                            line.classList.remove('active');
                        });
                        
                        // Activate current line
                        const currentLine = document.querySelector(`[data-index="${i}"]`);
                        if (currentLine) {
                            currentLine.classList.add('active');
                        }
                        currentLyricIndex = i;
                    }
                    break;
                }
            }
        }

        // Setup audio context for visualizer
        function setupAudioContext() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audioPlayer);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }

        // Visualizer animation
        function animateVisualizer() {
            if (!analyser) return;
            
            analyser.getByteFrequencyData(dataArray);
            
            bars.forEach((bar, index) => {
                const dataIndex = Math.floor(index * bufferLength / bars.length);
                const value = dataArray[dataIndex];
                const height = (value / 255) * 100;
                bar.style.height = `${Math.max(10, height)}px`;
            });
            
            requestAnimationFrame(animateVisualizer);
        }

        // Play/Pause
        playPauseBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                // Resume audio context if suspended
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                audioPlayer.play();
                videoBackground.play();
                playPauseBtn.innerHTML = '<div class="pause-icon"></div>';
                animateVisualizer();
                console.log('Playing');
            } else {
                audioPlayer.pause();
                videoBackground.pause();
                playPauseBtn.innerHTML = '<div class="play-icon"></div>';
                console.log('Paused');
            }
        });

        // Update time display and progress
        audioPlayer.addEventListener('timeupdate', () => {
            updateLyrics();
            
            const currentMinutes = Math.floor(audioPlayer.currentTime / 60);
            const currentSeconds = Math.floor(audioPlayer.currentTime % 60);
            const durationMinutes = Math.floor(audioPlayer.duration / 60);
            const durationSeconds = Math.floor(audioPlayer.duration % 60);
            
            timeDisplay.textContent = `${currentMinutes}:${currentSeconds.toString().padStart(2, '0')} / ${durationMinutes}:${durationSeconds.toString().padStart(2, '0')}`;
            
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.style.width = `${progress}%`;
        });

        // Seek functionality
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percentage = clickX / rect.width;
            audioPlayer.currentTime = percentage * audioPlayer.duration;
        });

        // Initialize
        createBars();
    </script>
</body>
</html>
